    <script>
      // Mobile Menu Toggle
      (function () {
        var menuToggle = document.getElementById("menu-toggle");
        var mobileMenu = document.getElementById("mobile-menu");
        var menuSpans = menuToggle ? menuToggle.querySelectorAll("span") : [];
        var mobileLinks = document.querySelectorAll(".nav-link-mobile");
        var menuOpen = false;

        function openMenu() {
          menuOpen = true;
          mobileMenu.style.transform = "translateX(0)";
          document.body.classList.add("overflow-hidden");
          if (menuSpans[0]) menuSpans[0].style.transform = "rotate(45deg) translate(4px, 4px)";
          if (menuSpans[1]) menuSpans[1].style.opacity = "0";
          if (menuSpans[2]) menuSpans[2].style.transform = "rotate(-45deg) translate(4px, -4px)";
        }

        function closeMenu() {
          menuOpen = false;
          mobileMenu.style.transform = "translateX(100%)";
          document.body.classList.remove("overflow-hidden");
          if (menuSpans[0]) menuSpans[0].style.transform = "";
          if (menuSpans[1]) menuSpans[1].style.opacity = "";
          if (menuSpans[2]) menuSpans[2].style.transform = "";
        }

        if (menuToggle) menuToggle.addEventListener("click", function () { menuOpen ? closeMenu() : openMenu(); });
        mobileLinks.forEach(function (link) { link.addEventListener("click", closeMenu); });
      })();
    </script>
  </body>
</html>
